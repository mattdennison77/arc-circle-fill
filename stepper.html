<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Coord Stepper</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Header */
  .hdr {
    background: #111111;
    border-bottom: 1px solid #2a2a2a;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .hdr-title { color: #ff6a00; font-size: 14px; letter-spacing: 2px; }
  .hdr-badge { color: #777777; font-size: 13px; }
  .hdr-badge b { color: #ff6a00; font-size: 16px; font-weight: normal; }

  /* Axis labels */
  .axes {
    background: #111111;
    border-bottom: 1px solid #2a2a2a;
    padding: 6px 16px;
    display: flex;
    flex-shrink: 0;
  }
  .axes span {
    flex: 1;
    text-align: center;
    font-size: 11px;
    letter-spacing: 1px;
    color: #777777;
    text-transform: uppercase;
  }
  .axes span:first-child { text-align: left; }
  .axes span:last-child  { text-align: right; }

  /* File info bar */
  .fileinfo {
    background: #120800;
    border-bottom: 1px solid #2a2a2a;
    padding: 5px 16px;
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .fileinfo span {
    font-size: 11px;
    color: #cccccc;
    letter-spacing: 0.5px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fileinfo span b { color: #ff6a00; font-weight: normal; }

  /* Main area */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* Previous row */
  .row-prev {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 16px;
    opacity: 0.55;
    min-height: 0;
  }

  /* Active row */
  .row-active {
    flex-shrink: 0;
    padding: 16px 12px 16px 14px;
    margin: 6px 8px;
    background: rgba(255,106,0,0.08);
    border: 2px solid rgba(255,106,0,0.5);
    border-radius: 12px;
    border-left: 5px solid #ff6a00;
    display: flex;
    align-items: center;
  }

  /* Next row */
  .row-next {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 16px;
    opacity: 0.55;
    min-height: 0;
  }

  /* Row content */
  .r-arc  { font-size: 9px; color: #4a4a4a; width: 22px; flex-shrink: 0; }
  .r-vals { flex: 1; display: flex; justify-content: space-around; }
  .r-val  { flex: 1; text-align: center; font-size: 18px; color: #aaaaaa; }
  .r-step { font-size: 9px; color: #4a4a4a; width: 22px; text-align: right; flex-shrink: 0; }

  /* Active overrides */
  .row-active .r-arc  { color: #ff6a00; font-size: 10px; width: 20px; }
  .row-active .r-step { color: #ff6a00; font-size: 10px; width: 20px; }
  .row-active .r-val  { color: #ffffff; font-weight: bold; }

  /* Active row inner layout — labels above values */
  .r-vals-active {
    flex: 1;
    display: flex;
    justify-content: space-around;
    gap: 4px;
  }
  .r-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .r-axis-lbl {
    font-size: clamp(9px, 2.5vw, 13px);
    font-weight: bold;
    color: #ff6a00;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .r-val-active {
    color: #ffffff;
    font-weight: bold;
    text-align: center;
    line-height: 1;
  }

  /* Previous/next font scales too */
  .row-prev .r-val,
  .row-next .r-val { font-size: clamp(13px, 4vw, 20px); color: #bbbbbb; }

  /* Nav buttons */
  .nav {
    display: flex;
    flex-shrink: 0;
  }
  .nav-btn {
    flex: 1;
    padding: 16px;
    background: #111111;
    border: none;
    border-top: 1px solid #2a2a2a;
    color: #ff6a00;
    font-size: 18px;
    cursor: pointer;
    font-family: monospace;
    letter-spacing: 1px;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:active { background: #333333; }
  .nav-btn:disabled { opacity: 0.2; }
  .nav-btn:first-child { border-right: 1px solid #2a2a2a; }

  /* Progress */
  .prog-wrap { height: 4px; background: #2a2a2a; flex-shrink: 0; }
  .prog-bar  { height: 100%; background: #ff6a00; transition: width 0.2s; }

  /* Footer */
  footer {
    background: #111111;
    border-top: 1px solid #2a2a2a;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .btn {
    font-family: monospace;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    border: 1px solid rgba(255,106,0,0.4);
    background: rgba(255,106,0,0.1);
    color: #ff6a00;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { background: rgba(255,106,0,0.35); }
  .btn.sec { color: #777777; background: transparent; border-color: #2a2a2a; }
  #file-input { display: none; }
  #status {
    flex: 1; text-align: right; font-size: 11px; color: #777777;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #status.ok  { color: #ff8c00; }
  #status.err { color: #ff6a00; }

  /* Empty state */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px;
    text-align: center;
  }
  .empty p { font-size: 14px; color: #4a4a4a; line-height: 1.8; }

  /* SVG Preview */
  .preview {
    flex-shrink: 0;
    background: #ffffff;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    height: 40vh;
    overflow: hidden;
    touch-action: none;
  }
  .preview svg { flex: 1; width: 100%; min-height: 0; touch-action: none; background: #ffffff; }

  /* Rotation controls — below the SVG */
  .preview-controls {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 5px 0;
    background: #f0f0f0;
    border-top: 1px solid #cccccc;
    flex-shrink: 0;
  }
  .prev-btn {
    width: 34px;
    height: 34px;
    background: #ffffff;
    border: 1px solid #cccccc;
    border-radius: 6px;
    color: #cc4400;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .prev-btn:active { background: #3a1a00; }

  @media (orientation: landscape) {
    .preview { height: 45vh; }
  }

  /* File info bar */
  .fileinfo {
    background: #120800;
    border-bottom: 1px solid #2a2a2a;
    padding: 5px 16px;
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .fileinfo span {
    font-size: 10px;
    color: #4a4a4a;
    letter-spacing: 0.5px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fileinfo span b { color: #777777; font-weight: normal; }

  /* Landscape — tighter vertical spacing */
  @media (orientation: landscape) {
    .hdr        { padding: 6px 16px; }
    .axes       { padding: 3px 16px; }
    .row-active { padding: 10px 16px 10px 20px; margin: 4px 8px; }
    .nav-btn    { padding: 10px; }
  }

  .spin {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid #2a2a2a; border-top-color: #ff6a00;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 4px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">⊙ COORD STEPPER</div>
  <div class="hdr-badge" id="badge">— / —</div>
</div>

<div class="preview" id="preview" style="display:none">
  <svg id="preview-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" style="touch-action:none;"></svg>
  <div class="preview-controls">
    <button class="prev-btn" onclick="rotatePreview(-90)" title="Rotate CCW">↺</button>
    <button class="prev-btn" onclick="rotatePreview(90)"  title="Rotate CW">↻</button>
    <button class="prev-btn" onclick="flipPreview('h')"   title="Flip H">⇔</button>
    <button class="prev-btn" onclick="flipPreview('v')"   title="Flip V">⇕</button>
    <button class="prev-btn" onclick="resetView()"        title="Reset view">⊡</button>
  </div>
</div>

<div class="fileinfo" id="fileinfo" style="display:none">
  <span id="fi-file">—</span>
  <span id="fi-sketch">—</span>
</div>

<div class="axes" id="axes" style="display:none">
  <span>Arc</span>
  <span id="lbl1">—</span>
  <span id="lbl2">—</span>
  <span>#</span>
</div>

<div class="main" id="main">
  <div class="empty">
    <p id="msg">Fetching coordinates<br>from GitHub...</p>
  </div>
</div>

<div class="prog-wrap" id="prog-wrap" style="display:none">
  <div class="prog-bar" id="prog-bar" style="width:0%"></div>
</div>

<footer>
  <button class="btn" onclick="fetchData()">↻ Refresh</button>
  <button class="btn sec" onclick="document.getElementById('file-input').click()">Load CSV</button>
  <input type="file" id="file-input" accept=".csv">
  <div id="status">Connecting...</div>
</footer>

<script>
const API_URL = 'https://api.github.com/repos/mattdennison77/arc-circle-fill/contents/arc_circle_report.csv';

let rows = [], cur = 0, l1 = 'A1', l2 = 'A2';

async function fetchData() {
  setStatus('', '<span class="spin"></span>Fetching...');
  showMsg('Fetching coordinates<br>from GitHub...');
  try {
    // GitHub API always returns latest — no CDN caching issues
    const r = await fetch(API_URL, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const json = await r.json();

    // API returns file content as base64 — decode it
    const base64 = json.content.replace(/\n/g, '');
    const csvText = atob(base64);
    parse(csvText);
  } catch(e) {
    setStatus('err', 'Failed — load CSV manually');
    showMsg('Could not reach GitHub.<br>Load CSV manually.');
  }
}

document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => parse(ev.target.result);
  r.readAsText(f);
});

let arcData   = [];
let viewRight = [1, 0];
let viewUp    = [0, 1];
let signs     = [1, 1];

// Preview rotation state — applied on top of the CSV view orientation
let previewRotation = 0;   // degrees: 0, 90, 180, 270
let previewFlipH    = 1;   // 1 or -1
let previewFlipV    = 1;   // 1 or -1

function rotatePreview(deg) {
  previewRotation = ((previewRotation + deg) % 360 + 360) % 360;
  viewZoom = 1; viewPanX = 0; viewPanY = 0;
  drawPreview();
}

function flipPreview(axis) {
  if (axis === 'h') previewFlipH *= -1;
  if (axis === 'v') previewFlipV *= -1;
  viewZoom = 1; viewPanX = 0; viewPanY = 0;
  drawPreview();
}

// ── Pan / Zoom ────────────────────────────────────────────────────────────────
let viewZoom = 1, viewPanX = 0, viewPanY = 0, baseVB = null;

function resetView() {
  viewZoom = 1; viewPanX = 0; viewPanY = 0;
  applyViewTransform();
}

function applyViewTransform() {
  if (!baseVB) return;
  const w  = baseVB.w / viewZoom;
  const h  = baseVB.h / viewZoom;
  const cx = baseVB.x + baseVB.w / 2 - viewPanX;
  const cy = baseVB.y + baseVB.h / 2 - viewPanY;
  document.getElementById('preview-svg')
    .setAttribute('viewBox', `${cx - w/2} ${cy - h/2} ${w} ${h}`);
}

// Touch handlers for pinch-zoom and pan — preview area only
(function() {
  let t0 = null, d0 = null;

  function tdist(a, b) { return Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY); }

  window.addEventListener('load', () => {
    const el = document.getElementById('preview');
    if (!el) return;

    el.addEventListener('touchstart', e => {
      // Only handle touches that start inside the preview SVG area (not buttons)
      if (e.target.closest('.preview-controls')) return;
      e.preventDefault(); // prevent page zoom/scroll
      if (e.touches.length === 1) { t0 = e.touches[0]; d0 = null; }
      else if (e.touches.length === 2) { d0 = tdist(e.touches[0], e.touches[1]); t0 = null; }
    }, { passive: false });

    el.addEventListener('touchmove', e => {
      if (e.target.closest('.preview-controls')) return;
      e.preventDefault(); // prevent page scroll
      if (!baseVB) return;
      const svgEl = document.getElementById('preview-svg');
      const sw = svgEl.clientWidth || 300, sh = svgEl.clientHeight || 150;

      if (e.touches.length === 1 && t0) {
        const dx = e.touches[0].clientX - t0.clientX;
        const dy = e.touches[0].clientY - t0.clientY;
        viewPanX += (dx / sw) * (baseVB.w / viewZoom);
        viewPanY += (dy / sh) * (baseVB.h / viewZoom);
        t0 = e.touches[0];
        applyViewTransform();
      } else if (e.touches.length === 2 && d0 !== null) {
        const d1 = tdist(e.touches[0], e.touches[1]);
        viewZoom = Math.max(0.5, Math.min(20, viewZoom * (d1 / d0)));
        d0 = d1;
        applyViewTransform();
      }
    }, { passive: false });

    el.addEventListener('touchend', e => {
      if (e.target.closest('.preview-controls')) return;
      e.preventDefault();
      if (e.touches.length < 2) d0 = null;
      if (e.touches.length === 1) t0 = e.touches[0];
      if (e.touches.length === 0) t0 = null;
    }, { passive: false });
  });
})();

// Apply rotation + flip to a screen-space point
function applyTransform(sx, sy) {
  // Apply flip
  let x = sx * previewFlipH;
  let y = sy * previewFlipV;
  // Apply rotation
  const rad = previewRotation * Math.PI / 180;
  const cos = Math.cos(rad), sin = Math.sin(rad);
  return [x * cos - y * sin, x * sin + y * cos];
}

function parse(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length < 2) { setStatus('err', 'CSV empty'); return; }

  let dataStart = 0;
  arcData = [];
  previewRotation = 0;
  previewFlipH    = 1;
  previewFlipV    = 1;

  // Read comment rows
  for (let i = 0; i < lines.length; i++) {
    const c = lines[i].split(',').map(v => v.replace(/^"|"$/g,'').trim());
    if (c[0] === '# File') {
      document.getElementById('fi-file').innerHTML   = `File: <b>${c[1] || '—'}</b>`;
      document.getElementById('fi-sketch').innerHTML = `Sketch: <b>${c[3] || '—'}</b>`;
      document.getElementById('fileinfo').style.display = 'flex';
      dataStart = i + 1;
    } else if (c[0] === '# Arcs') {
      const rawLine = lines[i].replace(/^"?# Arcs"?,/, '');
      const arcSegs = rawLine.split(/","|",|,"/).map(s => s.replace(/^"|"$/g, '').trim()).filter(Boolean);
      arcSegs.forEach(seg => {
        // Format: cx,cy,r,startA,sweep,cr,cx1:cy1;cx2:cy2;...
        const firstSemi = seg.indexOf(';');
        const metaPart  = firstSemi > -1 ? seg.substring(0, seg.lastIndexOf(',', firstSemi)) : seg;
        const p = metaPart.split(',').map(Number);
        if (p.length >= 6) {
          // Parse circle centres if present
          const circles = [];
          if (firstSemi > -1) {
            const circPart = seg.substring(seg.lastIndexOf(',', firstSemi) + 1);
            circPart.split(';').forEach(cp => {
              const [cx, cy] = cp.split(':').map(Number);
              if (!isNaN(cx) && !isNaN(cy)) circles.push([cx, cy]);
            });
          }
          arcData.push({ cx: p[0], cy: p[1], r: p[2], startA: p[3], sweep: p[4], cr: p[5], circles });
        }
      });
      dataStart = i + 1;
    } else if (c[0] === '# View') {
      viewRight = [parseFloat(c[1]), parseFloat(c[2])];
      viewUp    = [parseFloat(c[3]), parseFloat(c[4])];
      signs     = [parseFloat(c[5]), parseFloat(c[6])];
      dataStart = i + 1;
    } else {
      break;
    }
  }

  const h = lines[dataStart].split(',').map(v => v.replace(/^"|"$/g,'').trim());
  l1 = h[2] || 'A1'; l2 = h[3] || 'A2';
  document.getElementById('lbl1').textContent = l1;
  document.getElementById('lbl2').textContent = l2;

  rows = [];
  for (let i = dataStart + 1; i < lines.length; i++) {
    const c = lines[i].split(',').map(v => v.replace(/^"|"$/g,'').trim());
    if (c.length < 4) continue;
    rows.push({ arc: c[0], step: c[1], a1: parseFloat(c[2]).toFixed(2), a2: parseFloat(c[3]).toFixed(2) });
  }
  if (!rows.length) { setStatus('err', 'No data'); return; }
  cur = 0;
  document.getElementById('axes').style.display = 'flex';
  document.getElementById('prog-wrap').style.display = 'block';
  if (arcData.length > 0) document.getElementById('preview').style.display = 'flex';
  setStatus('ok', '✓ ' + rows.length + ' coordinates');
  render();
  drawPreview();
}

// ── SVG Preview ─────────────────────────────────────────────────────────────
function toSVG(xMm, yMm, minSx, minSy, scale) {
  // Project to screen space using view orientation
  const sx = xMm * viewRight[0] + yMm * viewRight[1];
  const sy = xMm * viewUp[0]    + yMm * viewUp[1];
  // Apply user rotation/flip
  const [rx, ry] = applyTransform(sx, sy);
  return [(rx - minSx) * scale, (ry - minSy) * scale];
}

function arcPathD(ad, minSx, minSy, scale) {
  const steps = 48;
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const a = ad.startA + (ad.sweep * i / steps);
    const x = ad.cx + ad.r * Math.cos(a);
    const y = ad.cy + ad.r * Math.sin(a);
    const [px, py] = toSVG(x, y, minSx, minSy, scale);
    pts.push(`${i === 0 ? 'M' : 'L'}${px.toFixed(2)},${py.toFixed(2)}`);
  }
  return pts.join(' ');
}

function circleSVG(cx, cy, r, minSx, minSy, scale, active) {
  const [px, py] = toSVG(cx, cy, minSx, minSy, scale);
  const pr   = r * scale;
  const sw   = Math.max(0.3, 1.0 / viewZoom);  // scale stroke with zoom
  const fill   = active ? 'rgba(255,107,53,0.2)' : 'none';
  const stroke = active ? '#ff6a00' : '#cc4400';
  const strokeW = active ? sw * 2 : sw;
  return `<circle cx="${px.toFixed(2)}" cy="${py.toFixed(2)}" r="${pr.toFixed(2)}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeW}"/>`;
}

function drawPreview() {
  if (!arcData.length || !rows.length) return;
  const svg = document.getElementById('preview-svg');
  const W = svg.clientWidth  || 300;
  const H = svg.clientHeight || 150;

  // Collect bounding box from ONLY the arc path and circle positions
  // Do NOT include origin (0,0) or mirrored points — they shrink the view
  const allX = [], allY = [];

  arcData.forEach(ad => {
    // Arc path points
    for (let i = 0; i <= 48; i++) {
      const a = ad.startA + ad.sweep * i / 48;
      allX.push(ad.cx + ad.r * Math.cos(a));
      allY.push(ad.cy + ad.r * Math.sin(a));
    }
    // Circle centre + radius extents
    if (ad.circles && ad.circles.length) {
      ad.circles.forEach(([cx, cy]) => {
        allX.push(cx + ad.cr, cx - ad.cr);
        allY.push(cy + ad.cr, cy - ad.cr);
      });
    } else {
      // fallback: inner arc boundary
      const innerR = ad.r - ad.cr;
      for (let i = 0; i <= 12; i++) {
        const a = ad.startA + ad.sweep * i / 12;
        allX.push(ad.cx + (innerR + ad.cr * 2) * Math.cos(a));
        allY.push(ad.cy + (innerR + ad.cr * 2) * Math.sin(a));
      }
    }
  });

  if (!allX.length) return;

  // Project to screen space with rotation/flip
  function projectX(x, y) {
    const sx = x * viewRight[0] + y * viewRight[1];
    const sy = x * viewUp[0]    + y * viewUp[1];
    return applyTransform(sx, sy)[0];
  }
  function projectY(x, y) {
    const sx = x * viewRight[0] + y * viewRight[1];
    const sy = x * viewUp[0]    + y * viewUp[1];
    return applyTransform(sx, sy)[1];
  }

  const allSx = allX.map((x, i) => projectX(x, allY[i]));
  const allSy = allX.map((x, i) => projectY(x, allY[i]));

  let minSx = Math.min(...allSx), maxSx = Math.max(...allSx);
  let minSy = Math.min(...allSy), maxSy = Math.max(...allSy);

  // Small padding (3%)
  const pad = 0.03;
  const rsx = maxSx - minSx || 1, rsy = maxSy - minSy || 1;
  minSx -= rsx * pad; maxSx += rsx * pad;
  minSy -= rsy * pad; maxSy += rsy * pad;

  const scale = Math.min(W / (maxSx - minSx), H / (maxSy - minSy));

  const curStep = parseInt(rows[cur].step);
  const curArc  = parseInt(rows[cur].arc);

  // Get current row's sketch-local coords from the stored arc circles
  // We find the active circle by matching closest position to current step's
  // world coordinates — robust against reordering
  // Build a flat list of all circle sketch-local positions with their step numbers
  const allCirclePositions = [];
  arcData.forEach((ad, ai) => {
    const arcRows = rows.filter(r => parseInt(r.arc) === ai + 1);
    const nCirc   = arcRows.length;
    const useExact = ad.circles && ad.circles.length === nCirc;
    for (let j = 0; j < nCirc; j++) {
      let cx, cy;
      if (useExact) {
        cx = ad.circles[j][0]; cy = ad.circles[j][1];
      } else {
        const innerR    = ad.r - ad.cr;
        const angleStep = nCirc > 1 ? ad.sweep / (nCirc - 1) : 0;
        const angle     = ad.startA + j * angleStep;
        cx = ad.cx + innerR * Math.cos(angle);
        cy = ad.cy + innerR * Math.sin(angle);
      }
      allCirclePositions.push({ cx, cy, step: parseInt(arcRows[j].step) });
    }
  });

  // Find which position matches the current step
  const activePos = allCirclePositions.find(p => p.step === curStep);

  let html = '<rect x="-9999" y="-9999" width="99999" height="99999" fill="white"/>';

  // Draw arcs
  const arcSW = Math.max(0.3, 1.2 / viewZoom);
  arcData.forEach(ad => {
    html += `<path d="${arcPathD(ad, minSx, minSy, scale)}" fill="none" stroke="#111111" stroke-width="${arcSW}" stroke-linecap="round"/>`;
  });

  // Draw circles — highlight the one matching current step by position
  arcData.forEach((ad, ai) => {
    const arcRows  = rows.filter(r => parseInt(r.arc) === ai + 1);
    const nCirc    = arcRows.length;
    if (nCirc === 0) return;

    const useExact = ad.circles && ad.circles.length === nCirc;

    for (let j = 0; j < nCirc; j++) {
      let cx, cy;
      if (useExact) {
        cx = ad.circles[j][0]; cy = ad.circles[j][1];
      } else {
        const innerR    = ad.r - ad.cr;
        const angleStep = nCirc > 1 ? ad.sweep / (nCirc - 1) : 0;
        const angle     = ad.startA + j * angleStep;
        cx = ad.cx + innerR * Math.cos(angle);
        cy = ad.cy + innerR * Math.sin(angle);
      }
      // Active if this position matches the current step's position
      const isActive = activePos &&
        Math.abs(cx - activePos.cx) < 0.01 &&
        Math.abs(cy - activePos.cy) < 0.01;
      html += circleSVG(cx, cy, ad.cr, minSx, minSy, scale, isActive);
    }
  });

  // Origin crosshair — scales with zoom so it doesn't get huge
  const [ox, oy] = toSVG(0, 0, minSx, minSy, scale);
  const armLen = Math.max(4, 12 / viewZoom);
  const origSW = Math.max(0.3, 0.8 / viewZoom);
  html += `<line x1="${ox-armLen}" y1="${oy}" x2="${ox+armLen}" y2="${oy}" stroke="#cc0000" stroke-width="${origSW}"/>`;
  html += `<line x1="${ox}" y1="${oy-armLen}" x2="${ox}" y2="${oy+armLen}" stroke="#cc0000" stroke-width="${origSW}"/>`;
  html += `<circle cx="${ox}" cy="${oy}" r="${Math.max(1.5, 3/viewZoom)}" fill="#cc0000" stroke="none"/>`;

  // ── Radius dimension lines ────────────────────────────────────────────────
  // For each arc draw a dimension arrow from centre to arc edge at mid-angle
  const dimSW   = Math.max(0.3, 0.8 / viewZoom);
  const headLen = Math.max(3, 6 / viewZoom);
  const fontSize = Math.max(6, 11 / viewZoom);

  arcData.forEach((ad, ai) => {
    // Use mid angle of arc for the dimension line direction
    const midA = ad.startA + ad.sweep / 2;
    const ux = Math.cos(midA), uy = Math.sin(midA);

    // Centre point
    const [cxP, cyP] = toSVG(ad.cx, ad.cy, minSx, minSy, scale);

    // Arc edge point
    const edgeX = ad.cx + ad.r * ux;
    const edgeY = ad.cy + ad.r * uy;
    const [exP, eyP] = toSVG(edgeX, edgeY, minSx, minSy, scale);

    // Direction vector in page space
    const ddx = exP - cxP, ddy = eyP - cyP;
    const dl  = Math.hypot(ddx, ddy) || 1;
    const dux = ddx / dl, duy = ddy / dl;

    // Perpendicular for arrowhead
    const px = -duy, py = dux;

    // Arrowhead at arc edge
    const ax1 = exP - dux * headLen + px * headLen * 0.4;
    const ay1 = eyP - duy * headLen + py * headLen * 0.4;
    const ax2 = exP - dux * headLen - px * headLen * 0.4;
    const ay2 = eyP - duy * headLen - py * headLen * 0.4;

    html += `<circle cx="${cxP.toFixed(2)}" cy="${cyP.toFixed(2)}" r="${Math.max(1, 2/viewZoom)}" fill="#ff6a00" stroke="none"/>`;
    html += `<line x1="${cxP.toFixed(2)}" y1="${cyP.toFixed(2)}" x2="${exP.toFixed(2)}" y2="${eyP.toFixed(2)}" stroke="#ff6a00" stroke-width="${dimSW}" stroke-dasharray="${Math.max(2, 4/viewZoom)},${Math.max(1.5, 3/viewZoom)}"/>`;
    html += `<polygon points="${exP.toFixed(2)},${eyP.toFixed(2)} ${ax1.toFixed(2)},${ay1.toFixed(2)} ${ax2.toFixed(2)},${ay2.toFixed(2)}" fill="#ff6a00" stroke="none"/>`;

    const labelX = (cxP + exP) / 2 + px * fontSize * 1.2;
    const labelY = (cyP + eyP) / 2 + py * fontSize * 1.2;
    const arcLabel = arcData.length > 1 ? `A${ai+1} R${ad.r.toFixed(2)}mm` : `R${ad.r.toFixed(2)}mm`;
    html += `<text x="${labelX.toFixed(2)}" y="${labelY.toFixed(2)}" font-size="${fontSize}" fill="#ff6a00" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-weight="bold">${arcLabel}</text>`;
  });

  svg.setAttribute('viewBox', `0 0 ${(maxSx-minSx)*scale} ${(maxSy-minSy)*scale}`);
  svg.innerHTML = html;

  // Store base viewBox for pan/zoom
  baseVB = { x: 0, y: 0, w: (maxSx-minSx)*scale, h: (maxSy-minSy)*scale };
  applyViewTransform();
}

function calcFontSize(a1, a2) {
  // Scale font down based on the longest coordinate string
  const maxLen = Math.max(a1.length, a2.length);
  const vw = window.innerWidth;
  // Base size on screen width, shrink for longer numbers
  if (maxLen <= 5)       return Math.min(42, vw * 0.10);  // e.g. 12.34
  else if (maxLen <= 7)  return Math.min(36, vw * 0.085); // e.g. 123.45
  else if (maxLen <= 9)  return Math.min(28, vw * 0.07);  // e.g. -1234.56
  else                   return Math.min(22, vw * 0.055); // very long
}

function render() {
  const prev = rows[cur - 1];
  const actv = rows[cur];
  const next = rows[cur + 1];

  // Dynamic font size for active row based on coordinate length
  const fs = calcFontSize(actv.a1, actv.a2);

  document.getElementById('main').innerHTML = `
    <div class="row-prev">${prev ? rowHTML(prev) : ''}</div>
    <div class="row-active">${activeRowHTML(actv, fs)}</div>
    <div class="row-next">${next ? rowHTML(next) : ''}</div>
    <div class="nav">
      <button class="nav-btn" onclick="go(${cur-1})" ${cur===0?'disabled':''}>▲ Prev</button>
      <button class="nav-btn" onclick="go(${cur+1})" ${cur===rows.length-1?'disabled':''}>Next ▼</button>
    </div>
  `;

  const pct = rows.length > 1 ? (cur / (rows.length - 1)) * 100 : 100;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('badge').innerHTML = `<b>${cur+1}</b> / ${rows.length}`;
}

function activeRowHTML(r, fs) {
  // Active box — axis labels above coordinates
  return `
    <div class="r-arc">A${r.arc}</div>
    <div class="r-vals-active">
      <div class="r-col">
        <div class="r-axis-lbl">${l1}</div>
        <div class="r-val-active" style="font-size:${fs.toFixed(1)}px">${r.a1}</div>
      </div>
      <div class="r-col">
        <div class="r-axis-lbl">${l2}</div>
        <div class="r-val-active" style="font-size:${fs.toFixed(1)}px">${r.a2}</div>
      </div>
    </div>
    <div class="r-step">${r.step}</div>`;
}

function rowHTML(r) {
  return `<div class="r-arc">A${r.arc}</div>
          <div class="r-vals">
            <div class="r-val">${r.a1}</div>
            <div class="r-val">${r.a2}</div>
          </div>
          <div class="r-step">${r.step}</div>`;
}

function go(idx) {
  if (!rows.length) return;
  cur = Math.max(0, Math.min(rows.length - 1, idx));
  render();
  drawPreview();
}

function showMsg(msg) {
  document.getElementById('main').innerHTML = `<div class="empty"><p id="msg">${msg}</p></div>`;
}

function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = type; el.innerHTML = msg;
}

// Swipe
let ty = 0;
document.addEventListener('touchstart', e => { ty = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend',   e => {
  const dy = ty - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 30) go(cur + (dy > 0 ? 1 : -1));
}, { passive: true });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp')   go(cur - 1);
  if (e.key === 'ArrowDown') go(cur + 1);
});

fetchData();
</script>
</body>
</html>
