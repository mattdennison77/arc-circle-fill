<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Coord Stepper</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0f14;
    color: #e8eeff;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Header */
  .hdr {
    background: #151820;
    border-bottom: 1px solid #252a35;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .hdr-title { color: #4f8fff; font-size: 14px; letter-spacing: 2px; }
  .hdr-badge { color: #6b7599; font-size: 13px; }
  .hdr-badge b { color: #4f8fff; font-size: 16px; font-weight: normal; }

  /* Axis labels */
  .axes {
    background: #151820;
    border-bottom: 1px solid #252a35;
    padding: 6px 16px;
    display: flex;
    flex-shrink: 0;
  }
  .axes span {
    flex: 1;
    text-align: center;
    font-size: 11px;
    letter-spacing: 1px;
    color: #4a5270;
    text-transform: uppercase;
  }
  .axes span:first-child { text-align: left; }
  .axes span:last-child  { text-align: right; }

  /* Main area */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* Previous row */
  .row-prev {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 16px;
    opacity: 0.3;
    min-height: 0;
  }

  /* Active row */
  .row-active {
    flex-shrink: 0;
    padding: 20px 16px 20px 20px;
    margin: 8px;
    background: rgba(79,143,255,0.12);
    border: 2px solid rgba(79,143,255,0.4);
    border-radius: 12px;
    border-left: 5px solid #4f8fff;
    display: flex;
    align-items: center;
  }

  /* Next row */
  .row-next {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 16px;
    opacity: 0.3;
    min-height: 0;
  }

  /* Row content */
  .r-arc  { font-size: 12px; color: #4a5270; width: 28px; flex-shrink: 0; }
  .r-vals { flex: 1; display: flex; justify-content: space-around; }
  .r-val  { flex: 1; text-align: center; font-size: 18px; color: #6b7599; }
  .r-step { font-size: 12px; color: #4a5270; width: 28px; text-align: right; flex-shrink: 0; }

  /* Active overrides */
  .row-active .r-arc  { color: #4f8fff; font-size: 13px; }
  .row-active .r-step { color: #4f8fff; font-size: 13px; }
  .row-active .r-val  { font-size: clamp(18px, 8vw, 42px); color: #ffffff; font-weight: bold; }

  /* Previous/next font scales too */
  .row-prev .r-val,
  .row-next .r-val { font-size: clamp(13px, 4vw, 22px); }

  /* Nav buttons */
  .nav {
    display: flex;
    flex-shrink: 0;
  }
  .nav-btn {
    flex: 1;
    padding: 16px;
    background: #151820;
    border: none;
    border-top: 1px solid #252a35;
    color: #4f8fff;
    font-size: 18px;
    cursor: pointer;
    font-family: monospace;
    letter-spacing: 1px;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:active { background: #2e3444; }
  .nav-btn:disabled { opacity: 0.2; }
  .nav-btn:first-child { border-right: 1px solid #252a35; }

  /* Progress */
  .prog-wrap { height: 4px; background: #252a35; flex-shrink: 0; }
  .prog-bar  { height: 100%; background: #4f8fff; transition: width 0.2s; }

  /* Footer */
  footer {
    background: #151820;
    border-top: 1px solid #252a35;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .btn {
    font-family: monospace;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    border: 1px solid rgba(79,143,255,0.3);
    background: rgba(79,143,255,0.1);
    color: #4f8fff;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { background: rgba(79,143,255,0.25); }
  .btn.sec { color: #6b7599; background: transparent; border-color: #252a35; }
  #file-input { display: none; }
  #status {
    flex: 1; text-align: right; font-size: 11px; color: #6b7599;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #status.ok  { color: #3de87a; }
  #status.err { color: #ff6b35; }

  /* Empty state */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px;
    text-align: center;
  }
  .empty p { font-size: 14px; color: #4a5270; line-height: 1.8; }

  /* SVG Preview */
  .preview {
    flex-shrink: 0;
    background: #0a0c10;
    border-bottom: 1px solid #252a35;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 33vh;
    overflow: hidden;
    position: relative;
  }
  .preview svg { width: 100%; height: 100%; }

  /* Rotation controls */
  .preview-controls {
    position: absolute;
    bottom: 6px;
    right: 6px;
    display: flex;
    gap: 4px;
    z-index: 10;
  }
  .prev-btn {
    width: 28px;
    height: 28px;
    background: rgba(21,24,32,0.85);
    border: 1px solid #252a35;
    border-radius: 6px;
    color: #4f8fff;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .prev-btn:active { background: #2e3444; }

  @media (orientation: landscape) {
    .preview { height: 40vh; }
  }

  /* File info bar */
  .fileinfo {
    background: #0d1520;
    border-bottom: 1px solid #252a35;
    padding: 5px 16px;
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .fileinfo span {
    font-size: 10px;
    color: #4a5270;
    letter-spacing: 0.5px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fileinfo span b { color: #6b7599; font-weight: normal; }

  /* Landscape — tighter vertical spacing */
  @media (orientation: landscape) {
    .hdr        { padding: 6px 16px; }
    .axes       { padding: 3px 16px; }
    .row-active { padding: 10px 16px 10px 20px; margin: 4px 8px; }
    .nav-btn    { padding: 10px; }
  }

  .spin {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid #252a35; border-top-color: #4f8fff;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 4px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">⊙ COORD STEPPER</div>
  <div class="hdr-badge" id="badge">— / —</div>
</div>

<div class="preview" id="preview" style="display:none">
  <svg id="preview-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
  <div class="preview-controls">
    <button class="prev-btn" onclick="rotatePreview(-90)" title="Rotate CCW">↺</button>
    <button class="prev-btn" onclick="rotatePreview(90)"  title="Rotate CW">↻</button>
    <button class="prev-btn" onclick="flipPreview('h')"   title="Flip H">⇔</button>
    <button class="prev-btn" onclick="flipPreview('v')"   title="Flip V">⇕</button>
  </div>
</div>

<div class="fileinfo" id="fileinfo" style="display:none">
  <span id="fi-file">—</span>
  <span id="fi-sketch">—</span>
</div>

<div class="axes" id="axes" style="display:none">
  <span>Arc</span>
  <span id="lbl1">—</span>
  <span id="lbl2">—</span>
  <span>#</span>
</div>

<div class="main" id="main">
  <div class="empty">
    <p id="msg">Fetching coordinates<br>from GitHub...</p>
  </div>
</div>

<div class="prog-wrap" id="prog-wrap" style="display:none">
  <div class="prog-bar" id="prog-bar" style="width:0%"></div>
</div>

<footer>
  <button class="btn" onclick="fetchData()">↻ Refresh</button>
  <button class="btn sec" onclick="document.getElementById('file-input').click()">Load CSV</button>
  <input type="file" id="file-input" accept=".csv">
  <div id="status">Connecting...</div>
</footer>

<script>
const URL = 'https://raw.githubusercontent.com/mattdennison77/arc-circle-fill/master/arc_circle_report.csv';

let rows = [], cur = 0, l1 = 'A1', l2 = 'A2';

async function fetchData() {
  setStatus('', '<span class="spin"></span>Fetching...');
  showMsg('Fetching coordinates<br>from GitHub...');
  try {
    const r = await fetch(URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    parse(await r.text());
  } catch(e) {
    setStatus('err', 'Failed — load CSV manually');
    showMsg('Could not reach GitHub.<br>Load CSV manually.');
  }
}

document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => parse(ev.target.result);
  r.readAsText(f);
});

let arcData   = [];
let viewRight = [1, 0];
let viewUp    = [0, 1];
let signs     = [1, 1];

// Preview rotation state — applied on top of the CSV view orientation
let previewRotation = 0;   // degrees: 0, 90, 180, 270
let previewFlipH    = 1;   // 1 or -1
let previewFlipV    = 1;   // 1 or -1

function rotatePreview(deg) {
  previewRotation = ((previewRotation + deg) % 360 + 360) % 360;
  drawPreview();
}

function flipPreview(axis) {
  if (axis === 'h') previewFlipH *= -1;
  if (axis === 'v') previewFlipV *= -1;
  drawPreview();
}

// Apply rotation + flip to a screen-space point
function applyTransform(sx, sy) {
  // Apply flip
  let x = sx * previewFlipH;
  let y = sy * previewFlipV;
  // Apply rotation
  const rad = previewRotation * Math.PI / 180;
  const cos = Math.cos(rad), sin = Math.sin(rad);
  return [x * cos - y * sin, x * sin + y * cos];
}

function parse(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length < 2) { setStatus('err', 'CSV empty'); return; }

  let dataStart = 0;
  arcData = [];
  previewRotation = 0;
  previewFlipH    = 1;
  previewFlipV    = 1;

  // Read comment rows
  for (let i = 0; i < lines.length; i++) {
    const c = lines[i].split(',').map(v => v.replace(/^"|"$/g,'').trim());
    if (c[0] === '# File') {
      document.getElementById('fi-file').innerHTML   = `File: <b>${c[1] || '—'}</b>`;
      document.getElementById('fi-sketch').innerHTML = `Sketch: <b>${c[3] || '—'}</b>`;
      document.getElementById('fileinfo').style.display = 'flex';
      dataStart = i + 1;
    } else if (c[0] === '# Arcs') {
      // Arc data may be wrapped in quotes due to CSV encoding
      // Re-join and split properly
      const rawLine = lines[i].replace(/^"?# Arcs"?,/, '');
      // Split by ","  or just , handling quoted segments
      const arcSegs = rawLine.split(/","|",|,"/).map(s => s.replace(/^"|"$/g, '').trim()).filter(Boolean);
      arcSegs.forEach(seg => {
        const p = seg.split(',').map(Number);
        if (p.length >= 6) {
          arcData.push({ cx: p[0], cy: p[1], r: p[2], startA: p[3], sweep: p[4], cr: p[5] });
        }
      });
      dataStart = i + 1;
    } else if (c[0] === '# View') {
      viewRight = [parseFloat(c[1]), parseFloat(c[2])];
      viewUp    = [parseFloat(c[3]), parseFloat(c[4])];
      signs     = [parseFloat(c[5]), parseFloat(c[6])];
      dataStart = i + 1;
    } else {
      break;
    }
  }

  const h = lines[dataStart].split(',').map(v => v.replace(/^"|"$/g,'').trim());
  l1 = h[2] || 'A1'; l2 = h[3] || 'A2';
  document.getElementById('lbl1').textContent = l1;
  document.getElementById('lbl2').textContent = l2;

  rows = [];
  for (let i = dataStart + 1; i < lines.length; i++) {
    const c = lines[i].split(',').map(v => v.replace(/^"|"$/g,'').trim());
    if (c.length < 4) continue;
    rows.push({ arc: c[0], step: c[1], a1: parseFloat(c[2]).toFixed(2), a2: parseFloat(c[3]).toFixed(2) });
  }
  if (!rows.length) { setStatus('err', 'No data'); return; }
  cur = 0;
  document.getElementById('axes').style.display = 'flex';
  document.getElementById('prog-wrap').style.display = 'block';
  if (arcData.length > 0) document.getElementById('preview').style.display = 'flex';
  setStatus('ok', '✓ ' + rows.length + ' coordinates');
  render();
  drawPreview();
}

// ── SVG Preview ─────────────────────────────────────────────────────────────
function toSVG(xMm, yMm, minSx, minSy, scale) {
  // Project to screen space using view orientation
  const sx = xMm * viewRight[0] + yMm * viewRight[1];
  const sy = xMm * viewUp[0]    + yMm * viewUp[1];
  // Apply user rotation/flip
  const [rx, ry] = applyTransform(sx, sy);
  return [(rx - minSx) * scale, (ry - minSy) * scale];
}

function arcPathD(ad, minSx, minSy, scale) {
  const steps = 48;
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const a = ad.startA + (ad.sweep * i / steps);
    const x = ad.cx + ad.r * Math.cos(a);
    const y = ad.cy + ad.r * Math.sin(a);
    const [px, py] = toSVG(x, y, minSx, minSy, scale);
    pts.push(`${i === 0 ? 'M' : 'L'}${px.toFixed(2)},${py.toFixed(2)}`);
  }
  return pts.join(' ');
}

function circleSVG(cx, cy, r, minSx, minSy, scale, active) {
  const [px, py] = toSVG(cx, cy, minSx, minSy, scale);
  const pr = r * scale;
  const fill   = active ? 'rgba(255,107,53,0.25)' : 'none';
  const stroke = active ? '#ff6b35' : 'rgba(79,143,255,0.4)';
  const sw     = active ? 1.5 : 0.8;
  return `<circle cx="${px.toFixed(2)}" cy="${py.toFixed(2)}" r="${pr.toFixed(2)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
}

function drawPreview() {
  if (!arcData.length) return;
  const svg = document.getElementById('preview-svg');
  const W = svg.clientWidth  || 300;
  const H = svg.clientHeight || 150;

  // Collect all points to compute bounds
  const allX = [0], allY = [0];
  arcData.forEach(ad => {
    for (let i = 0; i <= 36; i++) {
      const a = ad.startA + ad.sweep * i / 36;
      allX.push(ad.cx + (ad.r + ad.cr) * Math.cos(a));
      allY.push(ad.cy + (ad.r + ad.cr) * Math.sin(a));
    }
  });

  // Project to screen space with rotation/flip applied
  const allSx = allX.map((x, i) => {
    const sx = x * viewRight[0] + allY[i] * viewRight[1];
    const sy = x * viewUp[0]    + allY[i] * viewUp[1];
    return applyTransform(sx, sy)[0];
  });
  const allSy = allX.map((x, i) => {
    const sx = x * viewRight[0] + allY[i] * viewRight[1];
    const sy = x * viewUp[0]    + allY[i] * viewUp[1];
    return applyTransform(sx, sy)[1];
  });

  let minSx = Math.min(...allSx), maxSx = Math.max(...allSx);
  let minSy = Math.min(...allSy), maxSy = Math.max(...allSy);

  // Padding
  const pad = 0.08;
  const rsx = maxSx - minSx || 1, rsy = maxSy - minSy || 1;
  minSx -= rsx * pad; maxSx += rsx * pad;
  minSy -= rsy * pad; maxSy += rsy * pad;

  const scale = Math.min(W / (maxSx - minSx), H / (maxSy - minSy));

  // Get current circle index and its arc
  const curRow  = rows[cur];
  const curArc  = curRow ? parseInt(curRow.arc) - 1 : -1;
  const curStep = curRow ? parseInt(curRow.step) - 1 : -1;

  let html = '';

  // Draw arcs
  arcData.forEach((ad, ai) => {
    html += `<path d="${arcPathD(ad, minSx, minSy, scale)}" fill="none" stroke="#4f8fff" stroke-width="1.5" stroke-linecap="round"/>`;
  });

  // Draw all circles (active one highlighted)
  let circleIdx = 0;
  arcData.forEach((ad, ai) => {
    // Reconstruct circle positions along arc
    const innerR = ad.r - ad.cr;
    if (innerR <= 0) return;
    const minGaps = Math.ceil((Math.abs(ad.sweep) * innerR) / (ad.cr * 2));
    const nGaps   = Math.max(minGaps, 1);
    const nCirc   = nGaps + 1;
    const step    = ad.sweep / nGaps;

    for (let j = 0; j < nCirc; j++) {
      const a  = ad.startA + j * step;
      const cx = ad.cx + innerR * Math.cos(a);
      const cy = ad.cy + innerR * Math.sin(a);
      const isActive = (ai === curArc && circleIdx === curStep);
      html += circleSVG(cx, cy, ad.cr, minSx, minSy, scale, isActive);
      circleIdx++;
    }
    circleIdx = 0; // reset per arc — curStep is per arc
  });

  // Origin marker
  const [ox, oy] = toSVG(0, 0, minSx, minSy, scale);
  html += `<line x1="${ox-6}" y1="${oy}" x2="${ox+6}" y2="${oy}" stroke="#3de87a" stroke-width="1"/>`;
  html += `<line x1="${ox}" y1="${oy-6}" x2="${ox}" y2="${oy+6}" stroke="#3de87a" stroke-width="1"/>`;

  svg.setAttribute('viewBox', `0 0 ${(maxSx-minSx)*scale} ${(maxSy-minSy)*scale}`);
  svg.innerHTML = html;
}

function rowHTML(r) {
  return `<div class="r-arc">A${r.arc}</div>
          <div class="r-vals">
            <div class="r-val">${r.a1}</div>
            <div class="r-val">${r.a2}</div>
          </div>
          <div class="r-step">${r.step}</div>`;
}

function render() {
  const prev = rows[cur - 1];
  const actv = rows[cur];
  const next = rows[cur + 1];

  document.getElementById('main').innerHTML = `
    <div class="row-prev">${prev ? rowHTML(prev) : ''}</div>
    <div class="row-active">${rowHTML(actv)}</div>
    <div class="row-next">${next ? rowHTML(next) : ''}</div>
    <div class="nav">
      <button class="nav-btn" onclick="go(${cur-1})" ${cur===0?'disabled':''}>▲ Prev</button>
      <button class="nav-btn" onclick="go(${cur+1})" ${cur===rows.length-1?'disabled':''}>Next ▼</button>
    </div>
  `;

  const pct = rows.length > 1 ? (cur / (rows.length - 1)) * 100 : 100;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('badge').innerHTML = `<b>${cur+1}</b> / ${rows.length}`;
}

function go(idx) {
  if (!rows.length) return;
  cur = Math.max(0, Math.min(rows.length - 1, idx));
  render();
  drawPreview();
}

function showMsg(msg) {
  document.getElementById('main').innerHTML = `<div class="empty"><p id="msg">${msg}</p></div>`;
}

function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = type; el.innerHTML = msg;
}

// Swipe
let ty = 0;
document.addEventListener('touchstart', e => { ty = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend',   e => {
  const dy = ty - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 30) go(cur + (dy > 0 ? 1 : -1));
}, { passive: true });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp')   go(cur - 1);
  if (e.key === 'ArrowDown') go(cur + 1);
});

fetchData();
</script>
</body>
</html>
