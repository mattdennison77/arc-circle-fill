<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Coord Stepper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;500;700&display=swap');

  :root {
    --bg:        #0d0f14;
    --surface:   #151820;
    --border:    #252a35;
    --dim:       #2e3444;
    --muted:     #4a5270;
    --faint:     #6b7599;
    --label:     #8fa0cc;
    --active:    #e8eeff;
    --accent:    #4f8fff;
    --accent2:   #ff6b35;
    --success:   #3de87a;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--active);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--surface);
  }

  header h1 {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
  }

  #progress-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--faint);
    letter-spacing: 0.08em;
  }

  #progress-badge span {
    color: var(--accent);
    font-size: 13px;
  }

  /* ── Axis labels row ── */
  #axis-row {
    display: flex;
    justify-content: space-around;
    padding: 8px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .axis-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    flex: 1;
    text-align: center;
  }
  .axis-label:first-child { text-align: left; }
  .axis-label:last-child  { text-align: right; }

  /* ── Tape container ── */
  #tape-wrapper {
    flex: 1;
    display: flex;
    align-items: stretch;
    overflow: hidden;
    position: relative;
  }

  /* Gradient fade top & bottom */
  #tape-wrapper::before,
  #tape-wrapper::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 80px;
    z-index: 2;
    pointer-events: none;
  }
  #tape-wrapper::before {
    top: 0;
    background: linear-gradient(to bottom, var(--bg) 0%, transparent 100%);
  }
  #tape-wrapper::after {
    bottom: 0;
    background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
  }

  /* Arrow buttons */
  .arrow-btn {
    width: 52px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: none;
    cursor: pointer;
    z-index: 3;
    transition: background 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .arrow-btn:active { background: var(--dim); }
  .arrow-btn svg {
    width: 24px; height: 24px;
    stroke: var(--muted);
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.15s, transform 0.1s;
  }
  .arrow-btn:active svg { stroke: var(--accent); transform: scale(0.9); }

  /* Tape scroll area */
  #tape {
    flex: 1;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
  }

  #tape-inner {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Individual rows */
  .coord-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    flex-shrink: 0;
    transition: opacity 0.2s, color 0.2s;
    position: relative;
  }

  .coord-row .arc-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    width: 32px;
    flex-shrink: 0;
  }

  .coord-row .coords {
    flex: 1;
    display: flex;
    justify-content: space-around;
    font-family: var(--mono);
    font-size: 22px;
    letter-spacing: 0.04em;
  }

  .coord-row .coord-val {
    flex: 1;
    text-align: center;
  }

  .coord-row .step-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    width: 32px;
    text-align: right;
    flex-shrink: 0;
  }

  /* State variants */
  .coord-row.is-prev {
    opacity: 0.25;
    color: var(--faint);
  }
  .coord-row.is-prev .arc-num,
  .coord-row.is-prev .step-num { color: var(--dim); }

  .coord-row.is-next {
    opacity: 0.25;
    color: var(--faint);
  }
  .coord-row.is-next .arc-num,
  .coord-row.is-next .step-num { color: var(--dim); }

  .coord-row.is-active {
    opacity: 1;
    color: var(--active);
  }

  /* Active highlight bar */
  #active-highlight {
    position: absolute;
    left: 8px; right: 8px;
    height: 56px;
    background: linear-gradient(135deg, rgba(79,143,255,0.08), rgba(79,143,255,0.03));
    border: 1px solid rgba(79,143,255,0.2);
    border-radius: 8px;
    z-index: 0;
    pointer-events: none;
    top: 50%;
    transform: translateY(-50%);
  }

  /* Active row coords larger */
  .coord-row.is-active .coords {
    font-size: 28px;
    color: var(--active);
  }
  .coord-row.is-active .arc-num { color: var(--accent); }
  .coord-row.is-active .step-num { color: var(--accent); }

  /* Left accent line on active */
  .coord-row.is-active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 12px; bottom: 12px;
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* ── Progress bar ── */
  #progress-bar-wrap {
    height: 3px;
    background: var(--border);
    flex-shrink: 0;
  }
  #progress-bar {
    height: 100%;
    background: var(--accent);
    transition: width 0.25s ease;
    border-radius: 2px;
  }

  /* ── Footer ── */
  footer {
    padding: 10px 20px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 12px;
  }

  #load-btn {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--accent);
    background: rgba(79,143,255,0.08);
    border: 1px solid rgba(79,143,255,0.25);
    border-radius: 6px;
    padding: 8px 16px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s, border-color 0.15s;
  }
  #load-btn:active { background: rgba(79,143,255,0.18); }

  #file-input { display: none; }

  #status-msg {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--faint);
    flex: 1;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Empty state ── */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px;
  }

  #empty-state svg {
    width: 56px; height: 56px;
    stroke: var(--dim);
    fill: none;
    stroke-width: 1.5;
  }

  #empty-state p {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
    letter-spacing: 0.05em;
  }

  /* Swipe hint */
  #swipe-hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    text-align: center;
    padding: 4px;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <h1>⊙ Coord Stepper</h1>
  <div id="progress-badge">— / —</div>
</header>

<div id="axis-row" style="display:none">
  <div class="axis-label" id="lbl-arc">Arc</div>
  <div class="axis-label" id="lbl-a1">—</div>
  <div class="axis-label" id="lbl-a2">—</div>
  <div class="axis-label" id="lbl-step">#</div>
</div>

<!-- Empty state -->
<div id="empty-state">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="16" y1="13" x2="8" y2="13"/>
    <line x1="16" y1="17" x2="8" y2="17"/>
    <polyline points="10 9 9 9 8 9"/>
  </svg>
  <p>Load a CSV file exported<br>from Arc Circle Fill<br>to get started</p>
</div>

<!-- Tape view (hidden until CSV loaded) -->
<div id="tape-wrapper" style="display:none">
  <div id="active-highlight"></div>

  <button class="arrow-btn" id="btn-up" aria-label="Previous">
    <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <div id="tape">
    <div id="tape-inner"></div>
  </div>

  <button class="arrow-btn" id="btn-down" aria-label="Next">
    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
  </button>
</div>

<div id="progress-bar-wrap" style="display:none">
  <div id="progress-bar" style="width:0%"></div>
</div>

<div id="swipe-hint" style="display:none">swipe up / down to step</div>

<footer>
  <button id="load-btn" onclick="document.getElementById('file-input').click()">
    Load CSV
  </button>
  <input type="file" id="file-input" accept=".csv">
  <div id="status-msg">No file loaded</div>
</footer>

<script>
  let rows = [];
  let current = 0;
  const ROW_H = 56;
  const VISIBLE = 9; // odd number — centre is active

  const tapeInner   = document.getElementById('tape-inner');
  const progressBar = document.getElementById('progress-bar');
  const progressBadge = document.getElementById('progress-badge');
  const statusMsg   = document.getElementById('status-msg');
  const emptyState  = document.getElementById('empty-state');
  const tapeWrapper = document.getElementById('tape-wrapper');
  const progressWrap = document.getElementById('progress-bar-wrap');
  const axisRow     = document.getElementById('axis-row');
  const swipeHint   = document.getElementById('swipe-hint');

  // ── CSV parser ────────────────────────────────────────────────────────────
  document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => parseCSV(ev.target.result, file.name);
    reader.readAsText(file);
  });

  function parseCSV(text, filename) {
    const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
    if (lines.length < 2) { statusMsg.textContent = 'CSV appears empty'; return; }

    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
    rows = [];

    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
      if (cols.length < 4) continue;
      rows.push({
        arc:  cols[0],
        step: cols[1],
        a1:   parseFloat(cols[2]).toFixed(4),
        a2:   parseFloat(cols[3]).toFixed(4),
      });
    }

    if (rows.length === 0) { statusMsg.textContent = 'No data rows found'; return; }

    // Update axis labels from CSV headers
    document.getElementById('lbl-a1').textContent = headers[2] || 'A1';
    document.getElementById('lbl-a2').textContent = headers[3] || 'A2';

    current = 0;
    buildTape();
    showTape();
    statusMsg.textContent = filename;
  }

  // ── Build tape DOM ────────────────────────────────────────────────────────
  function buildTape() {
    tapeInner.innerHTML = '';
    rows.forEach((r, i) => {
      const div = document.createElement('div');
      div.className = 'coord-row';
      div.dataset.idx = i;
      div.innerHTML = `
        <div class="arc-num">A${r.arc}</div>
        <div class="coords">
          <div class="coord-val">${r.a1}</div>
          <div class="coord-val">${r.a2}</div>
        </div>
        <div class="step-num">${r.step}</div>
      `;
      tapeInner.appendChild(div);
    });
    updateTape();
  }

  function updateTape() {
    const half = Math.floor(VISIBLE / 2);
    const allRows = tapeInner.querySelectorAll('.coord-row');

    allRows.forEach((row, i) => {
      row.classList.remove('is-active', 'is-prev', 'is-next');
      const diff = i - current;
      if (diff === 0)       row.classList.add('is-active');
      else if (diff < 0)    row.classList.add('is-prev');
      else                  row.classList.add('is-next');

      // Fade further rows more aggressively
      const dist = Math.abs(diff);
      row.style.opacity = dist === 0 ? '1' :
                          dist === 1 ? '0.35' :
                          dist === 2 ? '0.18' : '0.07';
    });

    // Scroll tape so active row is centred
    const tapeH = document.getElementById('tape').clientHeight;
    const offset = (tapeH / 2) - (current * ROW_H) - (ROW_H / 2);
    tapeInner.style.transform = `translateY(${offset}px)`;

    // Progress
    const pct = rows.length > 1 ? (current / (rows.length - 1)) * 100 : 100;
    progressBar.style.width = pct + '%';
    progressBadge.innerHTML = `<span>${current + 1}</span> / ${rows.length}`;
  }

  function showTape() {
    emptyState.style.display    = 'none';
    tapeWrapper.style.display   = 'flex';
    progressWrap.style.display  = 'block';
    axisRow.style.display       = 'flex';
    swipeHint.style.display     = 'block';
  }

  // ── Navigation ────────────────────────────────────────────────────────────
  function goTo(idx) {
    if (rows.length === 0) return;
    current = Math.max(0, Math.min(rows.length - 1, idx));
    updateTape();
  }

  document.getElementById('btn-up').addEventListener('click',   () => goTo(current - 1));
  document.getElementById('btn-down').addEventListener('click', () => goTo(current + 1));

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp')   goTo(current - 1);
    if (e.key === 'ArrowDown') goTo(current + 1);
  });

  // Touch swipe support
  let touchStartY = 0;
  document.getElementById('tape').addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.getElementById('tape').addEventListener('touchend', e => {
    const dy = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(dy) > 30) goTo(current + (dy > 0 ? 1 : -1));
  }, { passive: true });
</script>
</body>
</html>
