<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Coord Stepper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;500;700&display=swap');

  :root {
    --bg:      #0d0f14;
    --surface: #151820;
    --border:  #252a35;
    --dim:     #2e3444;
    --muted:   #4a5270;
    --faint:   #6b7599;
    --active:  #e8eeff;
    --accent:  #4f8fff;
    --success: #3de87a;
    --warning: #ff6b35;
    --mono:    'Share Tech Mono', monospace;
    --sans:    'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--active);
    font-family: var(--sans);
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh; /* dynamic viewport height — handles mobile chrome bar */
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 {
    font-family: var(--mono);
    font-size: clamp(11px, 3.5vw, 14px);
    letter-spacing: 0.12em;
    color: var(--accent);
  }

  #progress-badge {
    font-family: var(--mono);
    font-size: clamp(11px, 3vw, 13px);
    color: var(--faint);
  }
  #progress-badge span { color: var(--accent); font-size: clamp(13px, 4vw, 16px); }

  /* ── Axis row ── */
  #axis-row {
    display: none;
    flex-direction: row;
    padding: 6px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .axis-label {
    flex: 1;
    text-align: center;
    font-family: var(--mono);
    font-size: clamp(9px, 2.8vw, 12px);
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .axis-label:first-child { text-align: left; }
  .axis-label:last-child  { text-align: right; }

  /* ── Tape wrapper ── */
  #tape-wrapper {
    display: none;
    flex: 1;
    flex-direction: row;
    align-items: stretch;
    overflow: hidden;
    position: relative;
    min-height: 0;
  }

  /* Fade top/bottom */
  #tape-wrapper::before,
  #tape-wrapper::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 25%;
    z-index: 2;
    pointer-events: none;
  }
  #tape-wrapper::before {
    top: 0;
    background: linear-gradient(to bottom, var(--bg), transparent);
  }
  #tape-wrapper::after {
    bottom: 0;
    background: linear-gradient(to top, var(--bg), transparent);
  }

  /* Arrow buttons */
  .arrow-btn {
    flex-shrink: 0;
    width: clamp(44px, 12vw, 56px);
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: none;
    cursor: pointer;
    z-index: 3;
    transition: background 0.15s;
    touch-action: manipulation;
  }
  .arrow-btn:active { background: var(--dim); }
  .arrow-btn svg {
    width: clamp(20px, 6vw, 28px);
    height: clamp(20px, 6vw, 28px);
    stroke: var(--muted);
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.15s;
  }
  .arrow-btn:active svg { stroke: var(--accent); }

  /* Tape scroll */
  #tape {
    flex: 1;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
  }

  #tape-inner {
    display: flex;
    flex-direction: column;
    transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Active highlight bar */
  #active-highlight {
    position: absolute;
    left: 6px; right: 6px;
    background: linear-gradient(135deg, rgba(79,143,255,0.1), rgba(79,143,255,0.04));
    border: 1px solid rgba(79,143,255,0.22);
    border-radius: 8px;
    z-index: 0;
    pointer-events: none;
    top: 50%;
  }

  /* Rows */
  .coord-row {
    display: flex;
    align-items: center;
    padding: 0 12px;
    flex-shrink: 0;
    position: relative;
    transition: opacity 0.18s;
  }

  .coord-row .arc-num {
    font-family: var(--mono);
    font-size: clamp(9px, 2.5vw, 11px);
    color: var(--muted);
    width: clamp(24px, 7vw, 36px);
    flex-shrink: 0;
  }

  .coord-row .coords {
    flex: 1;
    display: flex;
    justify-content: space-around;
    font-family: var(--mono);
    gap: 4px;
  }

  .coord-row .coord-val {
    flex: 1;
    text-align: center;
    white-space: nowrap;
  }

  .coord-row .step-num {
    font-family: var(--mono);
    font-size: clamp(9px, 2.5vw, 11px);
    color: var(--muted);
    width: clamp(24px, 7vw, 36px);
    text-align: right;
    flex-shrink: 0;
  }

  .coord-row.is-prev  { opacity: 0.25; }
  .coord-row.is-next  { opacity: 0.25; }
  .coord-row.is-active { opacity: 1; }

  .coord-row.is-active .arc-num  { color: var(--accent); }
  .coord-row.is-active .step-num { color: var(--accent); }
  .coord-row.is-active::before {
    content: '';
    position: absolute;
    left: 0; top: 16%; bottom: 16%;
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* ── Progress bar ── */
  #progress-bar-wrap {
    height: 3px;
    background: var(--border);
    flex-shrink: 0;
    display: none;
  }
  #progress-bar {
    height: 100%;
    background: var(--accent);
    transition: width 0.22s ease;
    border-radius: 2px;
  }

  /* ── Swipe hint ── */
  #swipe-hint {
    display: none;
    font-family: var(--mono);
    font-size: clamp(9px, 2.5vw, 11px);
    color: var(--dim);
    text-align: center;
    padding: 3px;
    flex-shrink: 0;
  }

  /* ── Footer ── */
  footer {
    display: flex;
    align-items: center;
    padding: 8px 14px 10px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    gap: 10px;
  }

  .foot-btn {
    font-family: var(--mono);
    font-size: clamp(10px, 3vw, 12px);
    letter-spacing: 0.08em;
    color: var(--accent);
    background: rgba(79,143,255,0.08);
    border: 1px solid rgba(79,143,255,0.25);
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
    white-space: nowrap;
    touch-action: manipulation;
  }
  .foot-btn:active { background: rgba(79,143,255,0.2); }
  .foot-btn.sec { color: var(--faint); background: transparent; border-color: var(--border); }

  #file-input { display: none; }

  #status-msg {
    font-family: var(--mono);
    font-size: clamp(9px, 2.5vw, 11px);
    color: var(--faint);
    flex: 1;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #status-msg.ok  { color: var(--success); }
  #status-msg.err { color: var(--warning); }

  /* ── Empty state ── */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px;
  }
  #empty-state svg { width: 48px; height: 48px; stroke: var(--dim); fill: none; stroke-width: 1.5; }
  #empty-state p {
    font-family: var(--mono);
    font-size: clamp(11px, 3vw, 13px);
    color: var(--muted);
    text-align: center;
    line-height: 1.9;
  }

  .spinner {
    display: inline-block;
    width: 11px; height: 11px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 5px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<script>
  const GITHUB_CSV_URL = 'https://raw.githubusercontent.com/mattdennison77/arc-circle-fill/master/arc_circle_report.csv';
</script>

<header>
  <h1>⊙ COORD STEPPER</h1>
  <div id="progress-badge">— / —</div>
</header>

<div id="axis-row">
  <div class="axis-label" id="lbl-arc">Arc</div>
  <div class="axis-label" id="lbl-a1">—</div>
  <div class="axis-label" id="lbl-a2">—</div>
  <div class="axis-label" id="lbl-step">#</div>
</div>

<div id="empty-state">
  <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
  <p id="empty-msg">Fetching latest coordinates<br>from GitHub...</p>
</div>

<div id="tape-wrapper">
  <div id="active-highlight"></div>
  <button class="arrow-btn" id="btn-up" aria-label="Previous">
    <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
  </button>
  <div id="tape">
    <div id="tape-inner"></div>
  </div>
  <button class="arrow-btn" id="btn-down" aria-label="Next">
    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
  </button>
</div>

<div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
<div id="swipe-hint">swipe up / down to step</div>

<footer>
  <button class="foot-btn" id="refresh-btn" onclick="fetchFromGitHub()">↻ Refresh</button>
  <button class="foot-btn sec" onclick="document.getElementById('file-input').click()">Load CSV</button>
  <input type="file" id="file-input" accept=".csv">
  <div id="status-msg" id="status-msg">Connecting...</div>
</footer>

<script>
  let rows    = [];
  let current = 0;
  let ROW_H   = 64; // recalculated on load

  const tapeEl     = document.getElementById('tape');
  const tapeInner  = document.getElementById('tape-inner');
  const progBar    = document.getElementById('progress-bar');
  const badge      = document.getElementById('progress-badge');
  const statusEl   = document.getElementById('status-msg');
  const emptyState = document.getElementById('empty-state');
  const emptyMsg   = document.getElementById('empty-msg');
  const tapeWrap   = document.getElementById('tape-wrapper');
  const progWrap   = document.getElementById('progress-bar-wrap');
  const axisRow    = document.getElementById('axis-row');
  const swipeHint  = document.getElementById('swipe-hint');
  const highlight  = document.getElementById('active-highlight');

  // ── Recalculate row height based on screen ────────────────────────────────
  function calcRowHeight() {
    // Aim for ~7 rows visible in the tape area
    const tapeH = tapeEl.clientHeight || window.innerHeight * 0.6;
    ROW_H = Math.max(52, Math.floor(tapeH / 7));
    // Apply to all rows and highlight
    document.querySelectorAll('.coord-row').forEach(r => r.style.height = ROW_H + 'px');
    highlight.style.height      = ROW_H + 'px';
    highlight.style.marginTop   = -(ROW_H / 2) + 'px';
    // Font sizes
    const fs_active = Math.max(18, Math.min(28, ROW_H * 0.45));
    const fs_normal = Math.max(13, Math.min(20, ROW_H * 0.32));
    document.querySelectorAll('.coord-row.is-active .coord-val').forEach(v => v.style.fontSize = fs_active + 'px');
    document.querySelectorAll('.coord-row:not(.is-active) .coord-val').forEach(v => v.style.fontSize = fs_normal + 'px');
  }

  window.addEventListener('resize', () => { calcRowHeight(); updateTape(); });

  // ── Fetch from GitHub ─────────────────────────────────────────────────────
  async function fetchFromGitHub() {
    statusEl.className = '';
    statusEl.innerHTML = '<span class="spinner"></span>Fetching...';
    emptyMsg.textContent = 'Fetching latest coordinates\nfrom GitHub...';
    try {
      const resp = await fetch(GITHUB_CSV_URL + '?t=' + Date.now());
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      parseCSV(await resp.text(), 'GitHub');
    } catch(e) {
      statusEl.textContent = 'GitHub fetch failed — load CSV manually';
      statusEl.className   = 'err';
      emptyMsg.textContent = 'Could not reach GitHub.\nLoad CSV manually below.';
    }
  }

  // ── Manual CSV load ───────────────────────────────────────────────────────
  document.getElementById('file-input').addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = ev => parseCSV(ev.target.result, f.name);
    r.readAsText(f);
  });

  // ── Parse CSV ─────────────────────────────────────────────────────────────
  function parseCSV(text, src) {
    const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
    if (lines.length < 2) { statusEl.textContent = 'CSV empty'; statusEl.className = 'err'; return; }

    const hdrs = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
    document.getElementById('lbl-a1').textContent = hdrs[2] || 'A1';
    document.getElementById('lbl-a2').textContent = hdrs[3] || 'A2';

    rows = [];
    for (let i = 1; i < lines.length; i++) {
      const c = lines[i].split(',').map(v => v.replace(/^"|"$/g, '').trim());
      if (c.length < 4) continue;
      rows.push({ arc: c[0], step: c[1],
                  a1: parseFloat(c[2]).toFixed(2),   // 2 decimal places
                  a2: parseFloat(c[3]).toFixed(2) });
    }

    if (!rows.length) { statusEl.textContent = 'No data found'; statusEl.className = 'err'; return; }

    buildTape();
    showTape();
    current = 0;
    updateTape();

    statusEl.textContent = '✓ ' + rows.length + ' coords · ' + src;
    statusEl.className   = 'ok';
  }

  // ── Build DOM ─────────────────────────────────────────────────────────────
  function buildTape() {
    tapeInner.innerHTML = '';
    rows.forEach((r, i) => {
      const d = document.createElement('div');
      d.className = 'coord-row';
      d.innerHTML =
        `<div class="arc-num">A${r.arc}</div>` +
        `<div class="coords">` +
          `<div class="coord-val">${r.a1}</div>` +
          `<div class="coord-val">${r.a2}</div>` +
        `</div>` +
        `<div class="step-num">${r.step}</div>`;
      tapeInner.appendChild(d);
    });
    setTimeout(calcRowHeight, 50);
  }

  // ── Update tape position and styles ───────────────────────────────────────
  function updateTape() {
    const all = tapeInner.querySelectorAll('.coord-row');
    const fsA = Math.max(18, Math.min(28, ROW_H * 0.45));
    const fsN = Math.max(13, Math.min(20, ROW_H * 0.32));

    all.forEach((row, i) => {
      const diff = i - current;
      const dist = Math.abs(diff);
      row.classList.toggle('is-active', diff === 0);
      row.classList.toggle('is-prev',   diff < 0);
      row.classList.toggle('is-next',   diff > 0);
      row.style.height  = ROW_H + 'px';
      row.style.opacity = dist === 0 ? '1' : dist === 1 ? '0.35' : dist === 2 ? '0.16' : '0.06';

      const val = row.querySelectorAll('.coord-val');
      val.forEach(v => {
        v.style.fontSize = diff === 0 ? fsA + 'px' : fsN + 'px';
        v.style.color    = diff === 0 ? 'var(--active)' : 'var(--faint)';
      });
    });

    // Scroll tape so active is centred
    const tapeH  = tapeEl.clientHeight;
    const offset = (tapeH / 2) - (current * ROW_H) - (ROW_H / 2);
    tapeInner.style.transform = `translateY(${offset}px)`;

    // Progress
    const pct = rows.length > 1 ? (current / (rows.length - 1)) * 100 : 100;
    progBar.style.width = pct + '%';
    badge.innerHTML = `<span>${current + 1}</span> / ${rows.length}`;

    highlight.style.height    = ROW_H + 'px';
    highlight.style.marginTop = -(ROW_H / 2) + 'px';
  }

  function showTape() {
    emptyState.style.display  = 'none';
    tapeWrap.style.display    = 'flex';
    progWrap.style.display    = 'block';
    axisRow.style.display     = 'flex';
    swipeHint.style.display   = 'block';
  }

  // ── Navigation ────────────────────────────────────────────────────────────
  function goTo(idx) {
    if (!rows.length) return;
    current = Math.max(0, Math.min(rows.length - 1, idx));
    updateTape();
  }

  document.getElementById('btn-up').addEventListener('click',   () => goTo(current - 1));
  document.getElementById('btn-down').addEventListener('click', () => goTo(current + 1));
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp')   goTo(current - 1);
    if (e.key === 'ArrowDown') goTo(current + 1);
  });

  let ty0 = 0;
  tapeEl.addEventListener('touchstart', e => { ty0 = e.touches[0].clientY; }, { passive: true });
  tapeEl.addEventListener('touchend',   e => {
    const dy = ty0 - e.changedTouches[0].clientY;
    if (Math.abs(dy) > 25) goTo(current + (dy > 0 ? 1 : -1));
  }, { passive: true });

  // ── Auto-fetch on load ────────────────────────────────────────────────────
  fetchFromGitHub();
</script>
</body>
</html>
